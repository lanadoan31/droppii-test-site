<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Droppii — Question Bank</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="data.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

// ============================================================================
// SIDEBAR / TOPBAR (minimal shell for context)
// ============================================================================
function Sidebar() {
  return (
    <aside className="sidebar">
      <div className="sidebar-brand">
        <div className="sidebar-brand-mark">D</div>
        <div className="sidebar-brand-name">
          Droppii
          <small>Test Admin</small>
        </div>
      </div>
      <nav className="sidebar-nav">
        <div className="sidebar-section-label">Workspace</div>
        <button className="nav-item"><Icon name="dashboard" size={17} /><span className="nav-item-label">Dashboard</span></button>
        <button className="nav-item"><Icon name="tests" size={17} /><span className="nav-item-label">Tests</span><span className="nav-item-badge">8</span></button>
        <button className="nav-item active"><Icon name="bank" size={17} /><span className="nav-item-label">Question bank</span></button>
        <button className="nav-item"><Icon name="results" size={17} /><span className="nav-item-label">Results</span></button>
      </nav>
      <div className="sidebar-footer">
        <button className="user-chip">
          <div className="avatar">AN</div>
          <div className="user-chip-info">
            <div className="name">An Nguyễn</div>
            <div className="email">an@droppii.vn</div>
          </div>
        </button>
      </div>
    </aside>
  );
}

function Topbar() {
  return (
    <header className="topbar">
      <button className="icon-btn"><Icon name="list" size={18} /></button>
      <div className="topbar-title">Question bank</div>
      <div className="topbar-spacer" />
      <div className="search-box">
        <Icon name="search" size={15} />
        <input placeholder="Search tests, questions, takers..." />
        <kbd>⌘K</kbd>
      </div>
      <button className="icon-btn"><Icon name="bell" size={18} /><span className="dot" /></button>
      <button className="icon-btn"><Icon name="info" size={18} /></button>
    </header>
  );
}

function Toast({ message, onHide }) {
  useEffect(() => {
    if (!message) return;
    const t = setTimeout(onHide, 2400);
    return () => clearTimeout(t);
  }, [message]);
  if (!message) return null;
  return <div className="toast"><Icon name="check" size={14} />{message}</div>;
}

// ============================================================================
// QUESTION BANK SCREEN
// ============================================================================
function QuestionBank({ tests, showToast }) {
  const [search, setSearch] = useState('');
  const [type, setType] = useState('all');
  const [selected, setSelected] = useState([]);
  const [pickerOpen, setPickerOpen] = useState(false);
  const [pickerQuestionIds, setPickerQuestionIds] = useState([]);

  const filtered = MOCK.questionBank.filter(q => {
    if (type !== 'all' && q.type !== type) return false;
    if (search && !q.text.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  const typeColor = {
    'multiple-choice': '#1F6FEB', 'multi-select': '#9333EA', 'true-false': '#2FA967',
    'short-answer': '#F26522', 'fill-blank': '#B58A00', 'matching': '#8B6F4E',
  };

  const toggleSel = (id) => setSelected(s => s.includes(id) ? s.filter(x => x !== id) : [...s, id]);
  const toggleAll = () => setSelected(s => s.length === filtered.length ? [] : filtered.map(q => q.id));

  const openPickerFor = (ids) => { setPickerQuestionIds(ids); setPickerOpen(true); };
  const closePicker = () => { setPickerOpen(false); setPickerQuestionIds([]); };

  return (
    <div className="content pop-enter">
      <div className="page-header">
        <div>
          <h1 className="page-title">Question bank</h1>
          <p className="page-sub">Reusable questions you can drop into any test.</p>
        </div>
        <div className="page-actions">
          <button className="btn btn-secondary"><Icon name="upload" size={14} /> Import CSV</button>
          <button className="btn btn-primary" onClick={() => showToast('Question added to bank')}>
            <Icon name="plus" size={14} /> New question
          </button>
        </div>
      </div>

      <div className="row" style={{ marginBottom: 16, gap: 8, flexWrap: 'wrap' }}>
        <div className="search-box" style={{ width: 320 }}>
          <Icon name="search" size={14} />
          <input placeholder="Search questions..." value={search} onChange={e => setSearch(e.target.value)} />
        </div>
        <select className="select" style={{ width: 180 }} value={type} onChange={e => setType(e.target.value)}>
          <option value="all">All types</option>
          <option value="multiple-choice">Multiple choice</option>
          <option value="multi-select">Multi-select</option>
          <option value="true-false">True / False</option>
          <option value="short-answer">Short answer</option>
          <option value="matching">Matching</option>
          <option value="fill-blank">Fill in blank</option>
        </select>
        <select className="select" style={{ width: 160 }} defaultValue="all">
          <option value="all">All difficulties</option>
          <option>Easy</option><option>Medium</option><option>Hard</option>
        </select>
      </div>

      {selected.length > 0 && (
        <div className="row" style={{ background: 'color-mix(in srgb, var(--brand-500) 10%, var(--surface))', border: '1px solid color-mix(in srgb, var(--brand-500) 28%, transparent)', padding: '10px 14px', borderRadius: 10, marginBottom: 12, justifyContent: 'space-between' }}>
          <div className="row" style={{ gap: 10 }}>
            <strong>{selected.length}</strong>
            <span style={{ color: 'var(--text-muted)' }}>{selected.length === 1 ? 'question' : 'questions'} selected</span>
          </div>
          <div className="row" style={{ gap: 8 }}>
            <button className="btn btn-ghost btn-sm" onClick={() => setSelected([])}>Clear</button>
            <button className="btn btn-primary btn-sm" onClick={() => openPickerFor(selected)}>
              <Icon name="plus" size={13} /> Add to test
            </button>
          </div>
        </div>
      )}

      <div className="table-wrap">
        <table className="data">
          <thead>
            <tr>
              <th style={{ width: 36 }}>
                <input type="checkbox" checked={selected.length === filtered.length && filtered.length > 0} onChange={toggleAll} />
              </th>
              <th>Question</th>
              <th>Type</th>
              <th>Difficulty</th>
              <th>Used in</th>
              <th style={{ width: 140 }}></th>
            </tr>
          </thead>
          <tbody>
            {filtered.map(q => (
              <tr key={q.id} style={{ background: selected.includes(q.id) ? 'color-mix(in srgb, var(--brand-500) 5%, transparent)' : undefined }}>
                <td onClick={e => e.stopPropagation()}>
                  <input type="checkbox" checked={selected.includes(q.id)} onChange={() => toggleSel(q.id)} />
                </td>
                <td>
                  <div style={{ fontWeight: 500, lineHeight: 1.4 }}>{q.text}</div>
                </td>
                <td>
                  <span className="badge" style={{ background: typeColor[q.type] + '22', color: typeColor[q.type] }}>
                    {q.type.replace('-', ' ')}
                  </span>
                </td>
                <td>
                  <span className="badge" style={{
                    background: q.difficulty === 'Easy' ? '#E5F5EC' : q.difficulty === 'Medium' ? '#FFF6DD' : '#FCE8E8',
                    color: q.difficulty === 'Easy' ? 'var(--accent-green)' : q.difficulty === 'Medium' ? '#B58A00' : 'var(--accent-red)',
                  }}>{q.difficulty}</span>
                </td>
                <td className="num">{q.usedIn} {q.usedIn === 1 ? 'test' : 'tests'}</td>
                <td>
                  <button className="btn btn-secondary btn-sm" onClick={() => openPickerFor([q.id])}>
                    <Icon name="plus" size={12} /> Add to test
                  </button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {pickerOpen && (
        <AddToTestModal
          questionIds={pickerQuestionIds}
          tests={tests}
          onClose={closePicker}
          onAdd={(testIds) => {
            const qLabel = pickerQuestionIds.length === 1 ? '1 question' : `${pickerQuestionIds.length} questions`;
            const tLabel = testIds.length === 1 ? '1 test' : `${testIds.length} tests`;
            showToast(`${qLabel} added to ${tLabel}`);
            closePicker();
            setSelected([]);
          }}
        />
      )}
    </div>
  );
}

// ============================================================================
// ADD-TO-TEST MODAL
// ============================================================================
function AddToTestModal({ questionIds, tests, onClose, onAdd }) {
  const [search, setSearch] = useState('');
  const [chosen, setChosen] = useState([]);

  const editable = (t) => t.status === 'draft' || t.status === 'scheduled';
  const filtered = tests.filter(t => !search || t.title.toLowerCase().includes(search.toLowerCase()));

  const toggle = (id, t) => {
    if (!editable(t)) return;
    setChosen(c => c.includes(id) ? c.filter(x => x !== id) : [...c, id]);
  };

  const statusMeta = {
    draft:     { label: 'Draft',     color: '#6B7280', editable: true,  hint: 'Editable' },
    scheduled: { label: 'Scheduled', color: 'var(--brand-500)', editable: true, hint: 'Edit before window opens' },
    published: { label: 'Published', color: 'var(--accent-green)', editable: false, hint: 'Unpublish first to edit' },
    archived:  { label: 'Archived',  color: '#9CA3AF', editable: false, hint: 'Restore from archive to edit' },
  };

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" style={{ maxWidth: 600 }} onClick={e => e.stopPropagation()}>
        <div className="modal-header">
          <div>
            <h2>Add to test</h2>
            <p>Pick one or more <strong>draft</strong> or <strong>scheduled</strong> tests. Adding {questionIds.length === 1 ? '1 question' : `${questionIds.length} questions`}.</p>
          </div>
          <button className="icon-btn" onClick={onClose}><Icon name="x" size={16} /></button>
        </div>
        <div className="modal-body">
          <div className="search-box" style={{ marginBottom: 12 }}>
            <Icon name="search" size={14} />
            <input placeholder="Search tests..." value={search} onChange={e => setSearch(e.target.value)} autoFocus />
          </div>
          <div style={{ maxHeight: 360, overflowY: 'auto', border: '1px solid var(--border)', borderRadius: 8 }}>
            {filtered.map(t => {
              const meta = statusMeta[t.status] || statusMeta.draft;
              const isChosen = chosen.includes(t.id);
              const disabled = !meta.editable;
              return (
                <div key={t.id}
                  onClick={() => toggle(t.id, t)}
                  style={{
                    display: 'flex', alignItems: 'center', gap: 12, padding: '12px 14px',
                    borderBottom: '1px solid var(--border)',
                    cursor: disabled ? 'not-allowed' : 'pointer',
                    opacity: disabled ? 0.55 : 1,
                    background: isChosen ? 'color-mix(in srgb, var(--brand-500) 8%, var(--surface))' : 'var(--surface)',
                  }}>
                  <input type="checkbox" checked={isChosen} disabled={disabled} readOnly style={{ pointerEvents: 'none' }} />
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontWeight: 600, marginBottom: 2 }}>{t.title}</div>
                    <div className="row" style={{ gap: 8, fontSize: 11.5, color: 'var(--text-muted)' }}>
                      <span style={{ color: meta.color, fontWeight: 600 }}>{meta.label}</span>
                      <span>·</span>
                      <span>{t.questions} questions</span>
                      <span>·</span>
                      <span>{t.skillLevel}</span>
                      <span>·</span>
                      <span>{t.category}</span>
                      <span>·</span>
                      <span>{meta.hint}</span>
                    </div>
                  </div>
                  {disabled && <Icon name="lock" size={14} />}
                </div>
              );
            })}
            {filtered.length === 0 && (
              <div style={{ padding: 24, textAlign: 'center', color: 'var(--text-muted)', fontSize: 13 }}>
                No tests match "{search}".
              </div>
            )}
          </div>
        </div>
        <div className="modal-footer">
          <div style={{ flex: 1, fontSize: 13, color: 'var(--text-muted)' }}>
            {chosen.length === 0 ? 'No tests selected' : `${chosen.length} ${chosen.length === 1 ? 'test' : 'tests'} selected`}
          </div>
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" disabled={chosen.length === 0} onClick={() => onAdd(chosen)}>
            <Icon name="plus" size={14} /> Add to {chosen.length || ''} {chosen.length === 1 ? 'test' : 'tests'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ============================================================================
// APP SHELL
// ============================================================================
function App() {
  const [toast, setToast] = useState(null);
  return (
    <div className="app">
      <Sidebar />
      <main className="main">
        <Topbar />
        <QuestionBank tests={MOCK.tests} showToast={setToast} />
      </main>
      <Toast message={toast} onHide={() => setToast(null)} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
